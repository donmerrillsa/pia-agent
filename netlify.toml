[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

# ── Scheduled function — Monday Morning Pipeline Run ─────────
# Runs every Monday at 12:00 PM UTC = 7:00 AM CDT
[functions."scheduled-pipeline"]
  schedule = "0 12 * * 1"

[dev]
  framework = "#custom"
  targetPort = 3000
  port = 8888
  command = "echo 'No dev server — functions only'"
  autoLaunch = false
